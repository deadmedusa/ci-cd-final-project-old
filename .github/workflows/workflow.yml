name: CI workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Force Python environment setup
        run: |
          # Completely reset pip environment
          python -m pip install --upgrade pip==25.1.1 --force-reinstall
          python -m pip cache purge
          python -m venv /opt/venv --clear
          source /opt/venv/bin/activate
          pip install --upgrade wheel setuptools

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nose coverage flake8 autopep8 pylint

      - name: Nuclear code formatting
        run: |
          # First pass: aggressive reformatting
          autopep8 --in-place --recursive --aggressive \
            --max-line-length=127 \
            --ignore=E402,E501,W503 \
            service/
          
          # Second pass: only fix line lengths
          autopep8 --in-place --recursive \
            --select=E501 \
            --max-line-length=127 \
            service/

          # Third pass: verify changes
          flake8 service/ \
            --max-line-length=127 \
            --count \
            --statistics \
            --show-source \
            --exit-zero || true

      - name: Strict linting
        run: |
          # Create .flake8 config dynamically
          cat > .flake8 <<EOF
          [flake8]
          max-line-length = 127
          ignore = E402,W503
          exclude = 
              .git,
              __pycache__,
              *.pyc
          per-file-ignores =
              */__init__.py: F401
          EOF
          
          flake8 service/ \
            --config=.flake8 \
            --count \
            --statistics \
            --show-source

      - name: Run tests
        run: |
          nosetests -c setup.cfg --with-xunit --xunit-file=./unittests.xml
