name: CI workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt nose coverage flake8 autopep8

      - name: Auto-format long lines
        run: |
          autopep8 --in-place --aggressive --max-line-length=127 service/*.py service/common/*.py

      - name: Lint with flake8
        run: |
          # Single command with ALL desired rules
          flake8 service \
            --count \
            --select=E9,F63,F7,F82 \
            --max-complexity=10 \
            --max-line-length=127 \
            --show-source \
            --statistics

      - name: Run unit tests
        run: |
          nosetests -v --with-spec --spec-color --with-coverage --cover-package=app
