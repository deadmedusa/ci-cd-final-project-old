name: CI workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Force pip upgrade and venv creation
        run: |
          # Force pip upgrade before any other operations
          python -m pip install --upgrade pip==25.1.1 --force-reinstall
          python -m venv /opt/venv
          source /opt/venv/bin/activate
          pip install --upgrade wheel setuptools

      - name: Install dependencies
        run: |
          pip install -r requirements.txt nose coverage flake8 autopep8 pylint

      - name: Enforce line length formatting
        run: |
          # First pass: aggressive reformatting
          autopep8 --in-place --recursive --aggressive \
            --max-line-length=127 \
            --ignore=E402,E501 \
            service/
          
          # Second pass: only fix line lengths
          autopep8 --in-place --recursive \
            --select=E501 \
            --max-line-length=127 \
            service/

      - name: Strict linting
        run: |
          flake8 service \
            --max-line-length=127 \
            --extend-ignore=E402 \
            --count \
            --statistics \
            --show-source \
            --exit-zero  # Don't fail build for style issues

      - name: Run tests
        run: |
          nosetests -c setup.cfg --with-xunit --xunit-file=./unittests.xml
